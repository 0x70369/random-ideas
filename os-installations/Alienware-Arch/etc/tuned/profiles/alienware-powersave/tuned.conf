#
# tuned configuration
#

[main]
summary=Optimize for low power consumption on Alienware

[cpu]
# https://docs.kernel.org/admin-guide/pm/cpufreq.html#generic-scaling-governors
## cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_available_governors
governor=powersave
# https://www.kernel.org/doc/html/latest/admin-guide/pm/intel_epb.html
## cat /sys/devices/system/cpu/cpu0/power/energy_perf_bias
energy_perf_bias=power
# https://wiki.archlinux.org/title/CPU_frequency_scaling#Setting_the_EPP
## cat /sys/devices/system/cpu/cpu0/cpufreq/energy_performance_available_preferences
energy_performance_preference=power
boost=0

[acpi]
# https://docs.kernel.org/userspace-api/sysfs-platform_profile.html
## cat /sys/firmware/acpi/platform_profile_choices
platform_profile=quiet

[eeepc_she]

[vm]

[audio]
timeout=10

[video]
radeon_powersave=dpm-battery, auto
panel_power_savings=3

[disk]
# Comma separated list of devices, all devices if commented out.
# devices=sda

[net]
# Comma separated list of devices, all devices if commented out.
# devices=eth0

[scsi_host]
alpm=med_power_with_dipm

[sysctl]
# https://wiki.archlinux.org/title/Power_management#Laptop_Mode
vm.laptop_mode=5
##vm.dirty_writeback_centisecs=1500 <--- I already set this value with a .conf file inside /etc/tmpfiles.d, configured with powertop: https://wiki.archlinux.org/title/Powertop
##kernel.nmi_watchdog=0 <--- See the explanation above

[script]
script=${i:PROFILE_DIR}/script.sh
