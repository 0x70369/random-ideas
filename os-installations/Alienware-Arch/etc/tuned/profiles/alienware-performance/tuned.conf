#
# tuned configuration
#

[main]
summary=Optimize for deterministic performance at the cost of increased power consumption on Alienware

[cpu]
force_latency=cstate.id_no_zero:1|3
# https://docs.kernel.org/admin-guide/pm/cpufreq.html#generic-scaling-governors
## cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_available_governors
governor=performance
# https://www.kernel.org/doc/html/latest/admin-guide/pm/intel_epb.html
## cat /sys/devices/system/cpu/cpu0/power/energy_perf_bias
energy_perf_bias=performance
# https://wiki.archlinux.org/title/CPU_frequency_scaling#Setting_the_EPP
## cat /sys/devices/system/cpu/cpu0/cpufreq/energy_performance_available_preferences
energy_performance_preference=performance
min_perf_pct=100
boost=1

[acpi]
# https://docs.kernel.org/userspace-api/sysfs-platform_profile.html
## cat /sys/firmware/acpi/platform_profile_choices
# The "performance" profile is equivalent to the "Overdrive" mode in AWCC on Windows, 
# i.e. the fans are constantly set to max speed. Select "balanced-performance" to save your ears.
platform_profile=balanced-performance

[vm]
# If a workload mostly uses anonymous memory and it hits this limit, the entire
# working set is buffered for I/O, and any more write buffering would require
# swapping, so it's time to throttle writes until I/O can catch up.  Workloads
# that mostly use file mappings may be able to use even higher values.
#
# The generator of dirty data starts writeback at this percentage (system default
# is 20%)
dirty_bytes=10%

# Start background writeback (via writeback threads) at this percentage (system
# default is 10%)
dirty_background_bytes=3%

[sysctl]
# The swappiness parameter controls the tendency of the kernel to move
# processes out of physical memory and onto the swap disk.
# 0 tells the kernel to avoid swapping processes out of physical memory
# for as long as possible
# 100 tells the kernel to aggressively swap processes out of physical memory
# and move them to swap cache
vm.swappiness=10

[video]
panel_power_savings=0
