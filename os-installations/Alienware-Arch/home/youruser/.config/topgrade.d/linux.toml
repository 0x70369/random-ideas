[linux]
# Arch Package Manager to use.
# Allowed values:
#   autodetect, aura, garuda_update, pacman, pamac, paru, pikaur, shelly, trizen, yay
arch_package_manager = "pacman"

# Arguments to pass yay (or paru) when updating packages
## -a makes yay only update AUR packages
yay_arguments = "-aSyu"

show_arch_news = true
