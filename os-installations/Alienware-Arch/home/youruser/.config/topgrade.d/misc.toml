[misc]
# On Unix systems, Topgrade should not be run as root, it
# will run commands with sudo or equivalent where needed.
# Set this to true to suppress the warning and confirmation
# prompt if Topgrade detects it is being run as root.
# (default: false)
allow_root = false

# Run `sudo -v` to cache credentials at the start of the run
# This avoids a blocking password prompt in the middle of an unattended run
# (default: false)
pre_sudo = true

# Periodically runs `sudo -v` or `please -w` to avoid password re-prompts during updates (default: false)
# WARNING: This is a potential security risk; if you walk away from the computer while topgrade is running,
# another person can come by, CTRL+C, and gain access to a sudo session.
# sudo_loop = true
# sudo_loop_interval = 240 # 4 minutes (240s); default if sudo_loop enabled

# Sudo command to be used
sudo_command = "sudo"

# Disable specific steps - same options as the command line flag
## What I don't use shouldn't run, I like fast upgrades :)
disable = ["conda", "composer", "brew", "mandb", "pkgfile", "windows", "mise", "go", "npm", "yarn", "deno", "viteplus", "vim", "vagrant", "distrobox", "lensfun", "julia", "zigup", "vscode", "pixi", "doom", "cargo", "rustup"]

# Run these steps before all others
first = ["chezmoi"]

# Run these steps after all others
last = ["system"]

# Do not set the terminal title (default: true)
set_title = true

# Display the time in step titles (default: true)
display_time = true

# Don't ask for confirmations (no default value)
assume_yes = false

# Whether to ask what to do after a step fails (default: true)
ask_retry = true

# Number of times to automatically retry a step when it fails (default: 0)
auto_retry = 0

# Show the reason for skipped steps (default: false)
# This has no effect if the "only" option is specified
show_skipped = true

# Run inside tmux (default: false)
run_in_tmux = false

# Cleanup temporary or old files (default: false)
cleanup = true

# Send a notification for every step (default: false)
# notify_each_step = false

# When to send a notification at the end of a run
# (default: "always", allowed values: "always", "never", "on_failure")
notify_end = "always"

# The Bash-it branch to update (default: "stable")
# bashit_branch = "stable"

# Run specific steps - same options as the command line flag
# only = ["system", "emacs"]

# Whether to self update
# this will be ignored if the binary is built without self update support
# available also via setting the environment variable TOPGRADE_NO_SELF_UPGRADE)
## I disable self updates since I use the version from the AUR
no_self_update = true

# Whether to show a distribution-specific summary if applicable, e.g. listing
# Pacman backup configuration files (*.pacsave and *.pacnew)
# (default: true)
show_distribution_summary = true
